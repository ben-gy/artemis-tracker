<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="earth" cx="40%" cy="40%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#0b3d91"/>
    </radialGradient>
    <radialGradient id="moon" cx="40%" cy="40%">
      <stop offset="0%" stop-color="#d1d5db"/>
      <stop offset="100%" stop-color="#6b7280"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#0a0e17"/>
  <!-- Earth -->
  <circle cx="22" cy="32" r="12" fill="url(#earth)"/>
  <!-- Moon -->
  <circle cx="50" cy="18" r="6" fill="url(#moon)"/>
  <!-- Trajectory arc -->
  <path d="M 34 32 Q 52 38, 50 24" stroke="#f59e0b" stroke-width="1.5" fill="none" stroke-dasharray="3,2"/>
  <!-- Spacecraft dot -->
  <circle cx="48" cy="28" r="2.5" fill="#f59e0b"/>
</svg>
