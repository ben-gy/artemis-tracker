<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artemis Mission Tracker</title>
    <meta name="description" content="Track NASA's Artemis missions in real-time with 3D trajectory visualization, live telemetry, and mission timeline">
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header id="app-header">
        <div class="header-left">
            <h1>ARTEMIS TRACKER</h1>
        </div>
        <div class="header-right">
            <select id="tz-select" class="header-select" title="Timezone"></select>
            <button id="unit-toggle" class="header-btn" title="Toggle units">
                <span id="unit-label">km</span>
            </button>
            <button id="glossary-btn" class="header-btn" title="Glossary">?</button>
        </div>
    </header>

    <nav id="mission-tabs" role="tablist"></nav>

    <div id="stats-bar"></div>

    <main id="app-main">
        <section id="scene-container">
            <div id="three-canvas-wrapper"></div>
            <div id="scene-overlay">
                <span id="scene-mission-label"></span>
                <span id="scene-status-badge"></span>
            </div>
            <div id="scene-controls">
                <div class="scene-btn-group">
                    <button id="cam-zoom-in" class="scene-btn" title="Zoom In">+</button>
                    <button id="cam-zoom-out" class="scene-btn" title="Zoom Out">&minus;</button>
                </div>
                <div class="scene-btn-group">
                    <button id="cam-left" class="scene-btn" title="Rotate Left">&larr;</button>
                    <button id="cam-right" class="scene-btn" title="Rotate Right">&rarr;</button>
                    <button id="cam-up" class="scene-btn" title="Tilt Up">&uarr;</button>
                    <button id="cam-down" class="scene-btn" title="Tilt Down">&darr;</button>
                </div>
                <div class="scene-btn-group">
                    <button id="focus-earth" class="scene-btn" title="Focus Earth">Earth</button>
                    <button id="focus-moon" class="scene-btn" title="Focus Moon">Moon</button>
                    <button id="focus-craft" class="scene-btn" title="Focus Spacecraft">Craft</button>
                    <button id="focus-reset" class="scene-btn" title="Reset View">Reset</button>
                </div>
            </div>
        </section>

        <section id="time-slider-container">
            <div id="time-slider-row">
                <button id="time-play-btn" class="time-btn" title="Play/Pause">&#9654;</button>
                <div id="time-slider-wrapper">
                    <input type="range" id="time-slider" min="0" max="1000" value="500" step="1">
                    <div id="time-slider-labels">
                        <span id="time-slider-start"></span>
                        <span id="time-slider-current"></span>
                        <span id="time-slider-end"></span>
                    </div>
                </div>
                <button id="time-live-btn" class="time-btn time-live" title="Jump to live">LIVE</button>
            </div>
        </section>

        <section id="panels-container">
            <div id="telemetry-panel" class="panel full-width" data-panel="telemetry">
                <div class="panel-header" role="button" tabindex="0">
                    <h2>TELEMETRY</h2>
                    <span class="panel-toggle">&#9660;</span>
                </div>
                <div class="panel-content" id="telemetry-content"></div>
            </div>

            <div id="video-panel" class="panel" data-panel="video">
                <div class="panel-header" role="button" tabindex="0">
                    <h2>NASA LIVE</h2>
                    <span class="panel-toggle">&#9660;</span>
                </div>
                <div class="panel-content" id="video-content"></div>
            </div>

            <div id="timeline-panel" class="panel" data-panel="timeline">
                <div class="panel-header" role="button" tabindex="0">
                    <h2>MISSION TIMELINE</h2>
                    <span class="panel-toggle">&#9660;</span>
                </div>
                <div class="panel-content" id="timeline-content"></div>
            </div>

            <div id="weather-panel" class="panel" data-panel="weather">
                <div class="panel-header" role="button" tabindex="0">
                    <h2>SPACE WEATHER</h2>
                    <span class="panel-toggle">&#9660;</span>
                </div>
                <div class="panel-content" id="weather-content"></div>
            </div>

            <div id="spacecraft-panel" class="panel" data-panel="spacecraft">
                <div class="panel-header" role="button" tabindex="0">
                    <h2>SPACECRAFT</h2>
                    <span class="panel-toggle">&#9660;</span>
                </div>
                <div class="panel-content" id="spacecraft-content"></div>
            </div>

            <div id="crew-panel" class="panel full-width" data-panel="crew">
                <div class="panel-header" role="button" tabindex="0">
                    <h2>CREW</h2>
                    <span class="panel-toggle">&#9660;</span>
                </div>
                <div class="panel-content" id="crew-content"></div>
            </div>

            <div id="dsn-panel" class="panel" data-panel="dsn">
                <div class="panel-header" role="button" tabindex="0">
                    <h2>DEEP SPACE NETWORK</h2>
                    <span class="panel-toggle">&#9660;</span>
                </div>
                <div class="panel-content" id="dsn-content"></div>
            </div>

            <div id="details-panel" class="panel" data-panel="details">
                <div class="panel-header" role="button" tabindex="0">
                    <h2>MISSION DETAILS</h2>
                    <span class="panel-toggle">&#9660;</span>
                </div>
                <div class="panel-content" id="details-content"></div>
            </div>
        </section>
    </main>

    <footer id="app-footer">
        <div id="footer-sources"></div>
        <div id="footer-credit"></div>
    </footer>

    <!-- Glossary Modal -->
    <div id="glossary-modal" class="modal" hidden>
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2>Space Glossary</h2>
                <button class="modal-close" aria-label="Close">&times;</button>
            </div>
            <input type="search" id="glossary-search" placeholder="Search terms..." autocomplete="off">
            <div id="glossary-list"></div>
        </div>
    </div>

    <div id="tooltip" class="tooltip" hidden></div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
